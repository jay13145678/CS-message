name: CS2 比赛日报

on:
  # 每天早上 8:00 (北京时间 8:00 = UTC 0:00) 运行
  schedule:
    - cron: '0 0 * * *'
  # 也支持手动触发 (workflow_dispatch)
  workflow_dispatch:

jobs:
  send-daily-report:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装 Playwright 和浏览器
      - name: 安装 Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      # 4. 运行脚本获取数据并发送邮件
      - name: 获取 CS2 比赛数据并发送邮件
        env:
          SMTP_AUTH_CODE: ${{ secrets.SMTP_AUTH_CODE }}
        run: python cs2_daily_playwright.py

      # 5. 记录执行日志
      - name: 记录执行日志
        run: |
          echo "CS2 比赛日报已于 $(date) 执行完成" >> execution_log.txt
