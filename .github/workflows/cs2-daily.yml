name: CS2 比赛日报

on:
  # 每天早上 8:00 (北京时间 8:00 = UTC 0:00) 运行
  schedule:
    - cron: '0 0 * * *'
  # 也支持手动触发 (workflow_dispatch)
  workflow_dispatch:

jobs:
  send-daily-report:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 设置 Node.js
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. 安装 Playwright 和运行脚本
      - name: 安装依赖并获取数据
        run: |
          npm install
          node scrape.js

      # 4. 设置 Python
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 5. 运行 Python 发送邮件
      - name: 发送邮件
        env:
          SMTP_AUTH_CODE: ${{ secrets.SMTP_AUTH_CODE }}
        run: python send_email.py
