name: CS2 比赛日报

on:
  # 每天早上 8:00 (北京时间 8:00 = UTC 0:00) 运行
  schedule:
    - cron: '0 0 * * *'
  # 也支持手动触发 (workflow_dispatch)
  workflow_dispatch:

jobs:
  send-daily-report:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 设置 Node.js (Playwright 需要)
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. 安装 Playwright
      - name: 安装 Playwright 和依赖
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      # 4. 安装 Python 和邮件依赖
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装 Python 依赖
        run: pip install beautifulsoup4

      # 5. 运行 Playwright 脚本
      - name: 获取 CS2 比赛数据并发送邮件
        env:
          SMTP_AUTH_CODE: ${{ secrets.SMTP_AUTH_CODE }}
        run: node scrape.js

      # 6. 记录执行日志
      - name: 记录执行日志
        run: |
          echo "CS2 比赛日报已于 $(date) 执行完成" >> execution_log.txt
